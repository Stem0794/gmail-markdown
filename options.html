<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Markdown for Gmail Options</title>
  <link rel="stylesheet" href="options.css">
</head>

<body>
  <h1>Markdown for Gmail Options</h1>
  <label><input type="checkbox" id="convertOnPaste"> Convert on Paste</label><br>
  <label><input type="checkbox" id="autoConvert"> Convert on Send</label><br>
  <label><input type="checkbox" id="autoFormat"> Enable Auto-Format (Live formatting as you type)</label><br>

  <label><input type="checkbox" id="gfm"> GitHub flavored Markdown</label><br>
  <label>Theme:
    <select id="theme">
      <option value="default">Default</option>
      <option value="bold">Bold</option>
    </select>
  </label><br>
  <label>Custom Shortcut: <input type="text" id="shortcut" placeholder="Ctrl+Shift+M or Cmd+Shift+M"></label>
  <div class="hint">Saving will also update the extension's command shortcut.</div><br>
  <label>Inline Code Shortcut: <input type="text" id="codeShortcut" placeholder="Ctrl+E or Cmd+E"></label>
  <div class="hint">Wraps selected text in inline code formatting.</div><br>
  <label><input type="checkbox" id="disableDefault"> Disable default shortcut</label><br>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>

</html>
